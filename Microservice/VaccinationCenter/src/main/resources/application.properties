spring.application.name=VaccinationCenter

server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/VaccinationCenterDB
spring.datasource.username=root
spring.datasource.password=Ice-hockey
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.show-sql=true


resilience4j.circuitbreaker.instances.citizenService.register-health-indicator=true
resilience4j.circuitbreaker.instances.citizenService.sliding-window-size=5
resilience4j.circuitbreaker.instances.citizenService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.citizenService.wait-duration-in-open-state=10s